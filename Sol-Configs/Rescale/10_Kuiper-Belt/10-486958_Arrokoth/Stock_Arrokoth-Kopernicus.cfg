@Kopernicus:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Arrokoth]
    {
        @Orbit
        {
            @semiMajorAxis /= 8.83
        }
        @Properties
        {
            @radius /= 8.83
            @gravParameter /= 77.9689
            @rotationPeriod /= 2.971531591620725
            @timewarpAltitudeLimits[*, ] /= 2.971531591620725
            @ScienceValues
            {
                @flyingAltitudeThreshold /= 2.971531591620725
                @spaceAltitudeThreshold /= 2.971531591620725
            }
        }
        @ScaledVersion
        {
            @fadeStart /= 8.83
            @fadeEnd /= 8.83
        }
        @PQS
        {
            @maxLevel -= 2.971531591620725
            @fadeStart /= 8.83
            @fadeEnd /= 8.83
            @deactivateAltitude /= 2.971531591620725
            @Mods
            {
                @VertexHeightMapBicubic
                {
                    @deformity /= 8.83
                    @offset /= 8.83
                }
            }
        }
    }
}
