@ParallaxTerrain:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Arrokoth]
    {
        @ShaderProperties
        {
            @_LowMidBlendStart /= 8.83
            @_LowMidBlendEnd /= 8.83
            @_MidHighBlendStart /= 8.83
            @_MidHighBlendEnd /= 8.83
        }
        @ParallaxScaledProperties
        {
            @minTerrainAltitude /= 8.83
            @maxTerrainAltitude /= 8.83
        }
    }
}