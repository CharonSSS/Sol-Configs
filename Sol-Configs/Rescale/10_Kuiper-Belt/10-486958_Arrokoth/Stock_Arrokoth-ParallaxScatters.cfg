@ParallaxScatters:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Arrokoth]
    {
        @Scatter,*
        {
            @Distribution
            {
                @spawnChance /= 8.83
                @minAltitude /= 8.83
                @maxAltitude /= 8.83
            }
        }
    }
}