@Kopernicus:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Styx]
    {
        @Orbit
        {
            @semiMajorAxis /= 7.62
        }
        @Properties
        {
            @radius /= 7.62
            @gravParameter /= 58.0644
            @rotationPeriod /= 2.760434748368452
            @timewarpAltitudeLimits[*, ] /= 2.760434748368452
            @ScienceValues
            {
                @flyingAltitudeThreshold /= 2.760434748368452
                @spaceAltitudeThreshold /= 2.760434748368452
            }
        }
        @ScaledVersion
        {
            @fadeStart /= 7.62
            @fadeEnd /= 7.62
        }
        @PQS
        {
            @maxLevel -= 7.62
            @fadeStart /= 7.62
            @fadeEnd /= 7.62
            @deactivateAltitude /= 2.760434748368452
            @Mods
            {
                @VertexHeightMapBicubic
                {
                    @deformity /= 7.62
                    @offset /= 7.62
                }
            }
        }
    }
}
