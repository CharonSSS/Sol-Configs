@ParallaxTerrain:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Styx]
    {
        @ShaderProperties
        {
            @_LowMidBlendStart /= 7.62
            @_LowMidBlendEnd /= 7.62
            @_MidHighBlendStart /= 7.62
            @_MidHighBlendEnd /= 7.62
        }
        @ParallaxScaledProperties
        {
            @minTerrainAltitude /= 7.62
            @maxTerrainAltitude /= 7.62
        }
    }
}