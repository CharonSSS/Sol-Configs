@Kopernicus:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Kerberos]
    {
        @Orbit
        {
            @semiMajorAxis /= 7.34
        }
        @Properties
        {
            @radius /= 7.34
            @gravParameter /= 53.8756
            @rotationPeriod /= 2.709243436828813
            @timewarpAltitudeLimits[*, ] /= 2.709243436828813
            @ScienceValues
            {
                @flyingAltitudeThreshold /= 2.709243436828813
                @spaceAltitudeThreshold /= 2.709243436828813
            }
        }
        @ScaledVersion
        {
            @fadeStart /= 7.34
            @fadeEnd /= 7.34
        }
        @PQS
        {
            @maxLevel -= 3
            @fadeStart /= 7.34
            @fadeEnd /= 7.34
            @deactivateAltitude /= 2.709243436828813
            @Mods
            {
                @VertexHeightMapBicubic
                {
                    @deformity /= 7.34
                    @offset /= 7.34
                }
            }
        }
    }
}
