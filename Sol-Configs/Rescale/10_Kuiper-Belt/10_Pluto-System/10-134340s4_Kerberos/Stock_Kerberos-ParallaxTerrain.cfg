@ParallaxTerrain:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Kerberos]
    {
        @ShaderProperties
        {
            @_LowMidBlendStart /= 7.34
            @_LowMidBlendEnd /= 7.34
            @_MidHighBlendStart /= 7.34
            @_MidHighBlendEnd /= 7.34
        }
        @ParallaxScaledProperties
        {
            @minTerrainAltitude /= 7.34
            @maxTerrainAltitude /= 7.34
        }
    }
}