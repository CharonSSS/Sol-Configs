@ParallaxScatters:HAS[@Sol_Configuration:HAS[#SystemScale[Stock]]]:AFTER[SolSystem]
{
    @Body[Kerberos]
    {
        @Scatter,*
        {
            @Distribution
            {
                @spawnChance /= 7.34
                @minAltitude /= 7.34
                @maxAltitude /= 7.34
            }
        }
    }
}